services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ember2-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ember_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: your_password
    volumes:
      - ./data/db/postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - ember-network

  neo4j:
    image: neo4j:latest
    container_name: ember2-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/your_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - ./data/db/neo4j_data:/data
    restart: always
    networks:
      - ember-network

networks:
  ember-network:
    driver: bridge

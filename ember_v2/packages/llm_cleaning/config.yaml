# LLM Cleaning Package 配置

# 自动修复不完整的标签
auto_fix_tags: true

# 严格的 JSON 模式（拒绝无法修复的 JSON）
strict_json: false

# 在输出中保留思考内容
preserve_thought_in_output: false

# 清理选项
cleaning:
  # 移除多余的代码块标记
  remove_code_blocks: true
  # 清理多余的空行（超过2个连续换行）
  collapse_empty_lines: true
  # 移除前后空白
  trim_whitespace: true